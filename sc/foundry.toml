[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
# 5740: unreachable code in OZ v5.0.0 ReentrancyGuardUpgradeable (library, not our code)
# 5574: contract code size > 24576 bytes (applies only to test/script contracts, not deployed)
# 3860: initcode size > 49152 bytes (applies only to test/script contracts, not deployed)
ignored_error_codes = [5740, 5574, 3860]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"
celo         = "https://forno.celo.org"

[etherscan]
celo_sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api", chain = 11142220 }
celo         = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42220 }

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 15
